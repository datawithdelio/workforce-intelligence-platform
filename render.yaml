services:
  - type: web
    name: workforce-intelligence-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    rootDir: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: API_PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: workforce-intelligence-db
          property: connectionString

databases:
  - name: workforce-intelligence-db
    plan: free
